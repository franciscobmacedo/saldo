name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test run

      - name: Build package
        run: pnpm build

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          # Get date in YYYY.M.D format (no leading zeros)
          # %-m and %-d are GNU extensions for no padding
          DATE_VERSION=$(date +'%Y.%-m.%-d')
          echo "Date-based version: $DATE_VERSION"
          
          # Fetch all tags to ensure we have the latest
          git fetch --tags --force
          
          STABLE_TAG=$(git tag -l "$DATE_VERSION")
          BETA_TAGS=$(git tag -l "$DATE_VERSION-beta.*")
          
          if [ -z "$STABLE_TAG" ] && [ -z "$BETA_TAGS" ]; then
            NEW_VERSION="$DATE_VERSION"
          else
            # Stable or some betas already exist for today
            LATEST_BETA=$(echo "$BETA_TAGS" | grep -oE '[0-9]+$' | sort -n | tail -1 || echo "")
            if [ -z "$LATEST_BETA" ]; then
              # Only stable exists
              NEW_VERSION="$DATE_VERSION-beta.1"
            else
              NEW_VERSION="$DATE_VERSION-beta.$((LATEST_BETA + 1))"
            fi
          fi
          
          echo "Determined version: $NEW_VERSION"
          
          # Update package.json
          npm version $NEW_VERSION --no-git-tag-version --allow-same-version
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_number=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          if [[ "$NEW_VERSION" == *"-beta."* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit version bump
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git tag ${{ steps.version.outputs.new_version }}

      - name: Push changes
        run: |
          git push origin main
          git push origin ${{ steps.version.outputs.new_version }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          release_name: Release ${{ steps.version.outputs.new_version }}
          body: |
            ## Changes
            
            Automated release ${{ steps.version.outputs.new_version }}
            
            ## Installation
            
            ```bash
            npm install saldo@${{ steps.version.outputs.version_number }}
            ```
            
            or
            
            ```bash
            pnpm add saldo@${{ steps.version.outputs.version_number }}
            ```
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}


      - name: Publish to NPM
        run: npm publish
